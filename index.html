
<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Identity Generator</title><style>:root{color-scheme:light;--ink:#17201d;--muted:#61706a;--line:#d9e0dc;--canvas:#f4f7f5;--accent:#087f5b;--dark:#056044;--soft:#e4f5ee;--danger:#a61b1b;--surface:#fff;--hover:#f7faf8}:root[data-theme=dark]{color-scheme:dark;--ink:#edf5ff;--muted:#9fb0c2;--line:#29415c;--canvas:#041020;--accent:#39d09d;--dark:#b8ffea;--soft:#102d3b;--danger:#ff9a9a;--surface:#0a1b2d;--hover:#0d2237}*{box-sizing:border-box}body{margin:0;min-height:100vh;background:var(--canvas);color:var(--ink);font-family:Inter,ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif}button,input{font:inherit}.shell{width:min(1080px,calc(100% - 32px));margin:auto;padding:56px 0 72px}.topbar{display:flex;justify-content:flex-end;margin-bottom:18px}.theme-switch{display:flex;border:1px solid var(--line);border-radius:6px;background:var(--surface);padding:3px}.theme-option{height:32px;border:0;border-radius:4px;background:transparent;color:var(--muted);padding:0 12px;font-size:.78rem;font-weight:800;cursor:pointer}.theme-option[aria-pressed=true]{background:var(--soft);color:var(--dark)}header{display:flex;align-items:end;justify-content:space-between;gap:28px;margin-bottom:24px}.eyebrow{margin:0 0 7px;color:var(--dark);font-size:.76rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase}h1{margin:0;font-size:clamp(2rem,5vw,3.4rem);line-height:1;letter-spacing:0}.subtitle{max-width:480px;margin:12px 0 0;color:var(--muted);line-height:1.6}.controls{display:flex;align-items:end;gap:10px;flex:none}.count-control{display:grid;gap:7px}label{color:var(--muted);font-size:.78rem;font-weight:700}input{width:76px;height:52px;border:1px solid var(--line);border-radius:6px;background:var(--surface);color:var(--ink);padding:0 12px;font-weight:700}input:focus-visible,button:focus-visible{outline:3px solid rgba(8,127,91,.26);outline-offset:2px}.generate{height:52px;border:0;border-radius:6px;background:var(--accent);color:#fff;padding:0 25px;font-weight:850;letter-spacing:.04em;cursor:pointer;box-shadow:0 8px 20px rgba(8,127,91,.2)}.generate:hover{background:var(--dark)}.generate:disabled{cursor:wait;opacity:.62}.status{min-height:24px;margin:0 0 10px;color:var(--muted);font-size:.9rem}.status.error{border:1px solid #f0b8b8;border-radius:6px;background:#fff0f0;color:var(--danger);padding:12px 14px}.results{display:grid;gap:16px}.record{overflow:hidden;border:1px solid var(--line);border-radius:8px;background:var(--surface);box-shadow:0 18px 50px rgba(23,32,29,.09)}.record-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding:15px 18px}.record-head h2{margin:0;font-size:1rem}.record-actions{display:flex;align-items:center;gap:12px}.hint{color:var(--muted);font-size:.78rem}.copy-all{height:34px;border:1px solid var(--line);border-radius:5px;background:var(--surface);color:var(--dark);padding:0 12px;font-size:.78rem;font-weight:800;cursor:pointer}.copy-all:hover,.copy-all.copied{border-color:var(--accent);background:var(--soft)}.fields{display:grid;grid-template-columns:repeat(3,minmax(0,1fr))}.field{position:relative;min-width:0;border:0;border-right:1px solid var(--line);border-bottom:1px solid var(--line);background:transparent;padding:16px 18px;text-align:left;cursor:copy}.field:nth-child(3n){border-right:0}.field:last-child{border-bottom:0}.field:hover{background:var(--hover)}.field.copied{background:var(--soft)}.field-label{display:block;margin-bottom:6px;color:var(--muted);font-size:.7rem;font-weight:800;text-transform:uppercase}.field-value{display:block;overflow-wrap:anywhere;color:var(--ink);font-family:ui-monospace,Consolas,monospace;font-size:.91rem;line-height:1.45}.copy-note{position:absolute;top:8px;right:10px;color:var(--dark);font-size:.69rem;font-weight:800;opacity:0}.field.copied .copy-note{opacity:1}.empty{border:1px dashed #bbc7c1;border-radius:8px;background:rgba(255,255,255,.52);color:var(--muted);padding:50px 24px;text-align:center}.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}@media(max-width:760px){.shell{width:min(100% - 24px,560px);padding-top:32px}header{align-items:stretch;flex-direction:column}.controls{width:100%}.count-control{flex:1}input{width:100%}.generate{flex:1.6;padding:0 16px}.fields{grid-template-columns:1fr}.field,.field:nth-child(3n),.field:nth-last-child(-n+3){border-right:0;border-bottom:1px solid var(--line)}.field:last-child{border-bottom:0}.hint{display:none}}@media(prefers-reduced-motion:reduce){*{transition:none!important}}</style></head><body>
<main class="shell"><div class="topbar"><div class="theme-switch" role="group" aria-label="Color theme"><button class="theme-option" type="button" data-theme-choice="light">Light</button><button class="theme-option" type="button" data-theme-choice="dark">Dark</button></div></div><header><div><p class="eyebrow">Utility / US Profiles</p><h1>Identity Generator</h1><p class="subtitle">Generate realistic test records, then select any field to copy its exact value.</p></div><form class="controls" id="generator-form"><div class="count-control"><label for="count">Records</label><input id="count" name="count" type="number" min="1" max="20" value="1" inputmode="numeric" required></div><button class="generate" id="generate-button" type="submit">GENERATE</button></form></header>
<p class="status" id="status" role="status" aria-live="polite">Ready to generate.</p><section class="results" id="results" aria-label="Generated records"><div class="empty">Your generated records will appear here.</div></section><div class="sr-only" id="copy-status" role="status" aria-live="polite"></div></main><script>const themeButtons=document.querySelectorAll('[data-theme-choice]');
function setTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem('identity-generator-theme',theme);themeButtons.forEach(button=>button.setAttribute('aria-pressed',String(button.dataset.themeChoice===theme)))}
setTheme(localStorage.getItem('identity-generator-theme')||'light');themeButtons.forEach(button=>button.addEventListener('click',()=>setTheme(button.dataset.themeChoice)));
const form=document.getElementById('generator-form'),countInput=document.getElementById('count'),generateButton=document.getElementById('generate-button'),results=document.getElementById('results'),status=document.getElementById('status'),copyStatus=document.getElementById('copy-status');
const labels={country:'Country',first:'First name',last:'Last name',email:'Email',phone:'Phone',phone2:'Formatted phone',street:'Street',city:'City',state1:'State',state2:'State code',zip:'ZIP code',username:'Username',password:'Password'};
function createField(key,value){const field=document.createElement('button');field.type='button';field.className='field';field.dataset.value=String(value??'');field.setAttribute('aria-label',`Copy ${labels[key]||key}: ${field.dataset.value}`);const label=document.createElement('span');label.className='field-label';label.textContent=labels[key]||key;const val=document.createElement('span');val.className='field-value';val.textContent=field.dataset.value;const note=document.createElement('span');note.className='copy-note';note.textContent='COPIED';note.setAttribute('aria-hidden','true');field.append(label,val,note);field.addEventListener('click',()=>copyValue(field));return field}
function renderUsers(users){results.replaceChildren();users.forEach((user,index)=>{const record=document.createElement('article');record.className='record';const head=document.createElement('div');head.className='record-head';const title=document.createElement('h2');title.textContent=`Record ${index+1}`;const actions=document.createElement('div');actions.className='record-actions';const hint=document.createElement('span');hint.className='hint';hint.textContent='Select a field to copy';const copyAll=document.createElement('button');copyAll.type='button';copyAll.className='copy-all';copyAll.textContent='Copy all';copyAll.setAttribute('aria-label',`Copy all fields from record ${index+1}`);copyAll.addEventListener('click',()=>copyRecord(user,copyAll));actions.append(hint,copyAll);head.append(title,actions);const fields=document.createElement('div');fields.className='fields';Object.entries(user).forEach(([key,value])=>fields.append(createField(key,value)));record.append(head,fields);results.append(record)})}
function fallbackCopy(text){const area=document.createElement('textarea');area.value=text;area.setAttribute('readonly','');area.style.cssText='position:fixed;opacity:0';document.body.append(area);area.select();const copied=document.execCommand('copy');area.remove();if(!copied)throw new Error('Copy rejected')}
async function copyRecord(user,button){const text=Object.entries(user).map(([key,value])=>`${labels[key]||key}: ${value}`).join('\n');try{if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(text);else fallbackCopy(text);button.classList.add('copied');button.textContent='Copied';copyStatus.textContent='All fields copied.';setTimeout(()=>{button.classList.remove('copied');button.textContent='Copy all'},1500)}catch(error){copyStatus.textContent='Copy failed. Select the fields and copy them manually.';status.textContent='Could not access the clipboard. Your browser may be blocking copy access.';status.className='status error'}}
async function copyValue(field){try{if(navigator.clipboard&&window.isSecureContext)await navigator.clipboard.writeText(field.dataset.value);else fallbackCopy(field.dataset.value);document.querySelectorAll('.field.copied').forEach(item=>item.classList.remove('copied'));field.classList.add('copied');copyStatus.textContent=`${field.querySelector('.field-label').textContent} copied.`;setTimeout(()=>field.classList.remove('copied'),1500)}catch(error){copyStatus.textContent='Copy failed. Select the value and copy it manually.';status.textContent='Could not access the clipboard. Your browser may be blocking copy access.';status.className='status error'}}
let generatorData;
function lines(text){return text.replace(/^\uFEFF/,'').split(/\r?\n/).map(line=>line.trim()).filter(Boolean)}
async function loadGeneratorData(){if(generatorData)return generatorData;const files=await Promise.all(['name.txt','domain.txt','uszips.txt','phone.txt'].map(async file=>{const response=await fetch(file);if(!response.ok)throw new Error(`Could not load ${file}.`);return lines(await response.text())}));const [names,domains,zipLines,phoneLines]=files;if(!zipLines[0].startsWith('zip,city,state_id,state_name'))throw new Error('Unexpected ZIP data format.');const zips=zipLines.slice(1).map(line=>{const [zip,city,state_id,state_name]=line.split(',');return{zip,city,state_id,state_name}});const phoneByState=new Map();phoneLines.forEach(line=>{const parts=line.split(','),codes=[];let i=parts.length-1;while(i>=0&&/^\d{3}$/.test(parts[i]))codes.unshift(parts[i--]);const state=parts.slice(0,i+1).join(',').trim();if(state&&codes.length)phoneByState.set(state,codes)});generatorData={names,domains,zips,phoneByState};return generatorData}
function pickRandom(items){return items[Math.floor(Math.random()*items.length)]}
function randomDigits(length){let value='';for(let i=0;i<length;i++)value+=Math.floor(Math.random()*10);return value}
function randomInt(min,max){return Math.floor(Math.random()*(max-min+1))+min}
function insertEmailSeparator(username){const separator=randomDigits(randomInt(1,3)),length=username.length;if(length<=2)return username+separator+randomDigits(1);let digitStart=length;while(digitStart>0&&/\d/.test(username[digitStart-1]))digitStart--;const positions=[1,2];if(digitStart<length&&digitStart>0)positions.push(digitStart);const position=pickRandom(positions);return username.slice(0,position)+separator+username.slice(position)}
function generateUser(data){const first=pickRandom(data.names),last=pickRandom(data.names),lastClean=last.toLowerCase().replace(/\s/g,''),firstClean=first.toLowerCase().replace(/\s/g,''),usernameBase=Math.random()<.5?first.charAt(0).toLowerCase()+lastClean:last.charAt(0).toLowerCase()+firstClean,username=usernameBase+randomDigits(randomInt(2,4)),email=`${insertEmailSeparator(username)}@${pickRandom(data.domains)}`,row=pickRandom(data.zips),city=row.city,state1=row.state_name,state2=row.state_id,zip=row.zip,street=`${randomInt(100,9999)} ${pickRandom(data.zips).city} ${city}`,areaCodes=data.phoneByState.get(state1),areaCode=areaCodes?pickRandom(areaCodes):randomDigits(3),rest=randomDigits(7),phone=areaCode+rest,phone2=`${areaCode}-${rest.slice(0,3)}-${rest.slice(3)}`;return{country:'United States',first,last,email,phone,phone2,street,city,state1,state2,zip,username,password:'A9f$T3#kLm7!xZ2P'}}
form.addEventListener('submit',async event=>{event.preventDefault();if(!form.reportValidity())return;generateButton.disabled=true;generateButton.textContent='GENERATING...';status.className='status';status.textContent='Loading data and generating records...';try{const data=await loadGeneratorData(),count=Number.parseInt(countInput.value,10);if(!Number.isInteger(count)||count<1||count>20)throw new Error('Count must be between 1 and 20.');const users=Array.from({length:count},()=>generateUser(data));renderUsers(users);status.textContent=`${users.length} ${users.length===1?'record':'records'} generated.`}catch(error){results.replaceChildren();const empty=document.createElement('div');empty.className='empty';empty.textContent='No records available. Please try again.';results.append(empty);status.className='status error';status.textContent=error instanceof Error?error.message:'Generation failed. Please try again.'}finally{generateButton.disabled=false;generateButton.textContent='GENERATE'}});</script></body></html>
